            alergias: "entry.1360521152"

            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

            if (audioRef.current) {

                audioRef.current.play().catch(e => console.log("Reproducción bloqueada por el navegador"));
              } else {
                audioRef.current.pause();
              }
            }
          }, [isPlaying]);

          const handleInputChange = (field) => (e) => {
            setFormData(prev => ({ ...prev, [field]: e.target.value }));
          };

          // EL HACK DEL IFRAME: Evitamos el JS Fetch por completo
          const handleSubmit = () => {
            // ¡NO usamos e.preventDefault() aquí!
            // Dejamos que el navegador envíe el paquete de forma nativa al iframe oculto
            setLoading(true);
            setTimeout(() => {
              setSubmitted(true);
              setLoading(false);
            }, 1500); // Asumimos éxito después de 1.5s, burlando los bloqueos de seguridad
          };

            const asisteBoda = formData.asistencia === 'Confirmar asistencia';
            const asistePre = formData.asistenciaPreWedding === 'Confirmar Asistencia';

              return "Qué lástima que no nos puedas acompañar presencialmente, pero sabemos que nos mandas tus mejores deseos para nuestro nuevo camino juntos.";

              return "Gracias por acompañarnos, nos vemos el sábado en la boda.";

            const url = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=Boda+Laura+%26+Gabriel&dates=20260808T140000/20260809T020000&details=Acomp%C3%A1%C3%B1anos+a+celebrar+nuestro+matrimonio.&location=Hacienda+Retiro+Real,+Villa+de+Leyva,+Boyac%C3%A1";

                  <div className="grid md:grid-cols-2 gap-10">
                    <div className="bg-white/80 backdrop-blur-md p-12 rounded-[3rem] shadow-sm border border-white/60">
                      <MapPin className="text-[#5C768D] w-8 h-8 mb-8" />
                      <h3 className="text-3xl mb-4 font-light text-[#2C3E50]">Hacienda Retiro Real</h3>
                      <p className="text-[#7F8C8D] font-sans text-base mb-12">Km 2 vía Arcabuco. Villa de Leyva, Boyacá.</p>
                      <div className="grid grid-cols-2 gap-4">
                        <button onClick={openGmaps} className="flex items-center justify-center space-x-3 border border-[#EAD3C6] py-4 rounded-2xl text-[10px] uppercase tracking-widest font-sans hover:bg-[#FDF7F2] hover:border-[#5C768D] transition-all">
                          <Navigation className="w-4 h-4 text-[#5C768D]" /><span>Google Maps</span>
                        </button>
                        <button onClick={openWaze} className="flex items-center justify-center space-x-3 border border-[#EAD3C6] py-4 rounded-2xl text-[10px] uppercase tracking-widest font-sans hover:bg-[#FDF7F2] hover:border-[#5C768D] transition-all">
                          <ExternalLink className="w-4 h-4 text-[#5C768D]" /><span>Waze</span>
                        </button>
                      </div>
                    </div>
                    <div className="bg-[#5C768D] p-12 rounded-[3rem] text-white shadow-xl shadow-blue-900/10 relative overflow-hidden">
                      <div className="absolute -top-24 -right-24 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl"></div>
                      <Clock className="text-[#F0F5F9] w-8 h-8 mb-8 relative z-10" />
                      <h3 className="text-3xl mb-4 font-light relative z-10">Sábado, 08 de Agosto</h3>
                      <p className="text-white/80 font-sans text-base mb-12 relative z-10">Ceremonia religiosa: 02:00 PM.<br />Agradecemos su puntualidad.</p>
                      <button onClick={openCalendar} className="w-full bg-white text-[#5C768D] py-5 rounded-2xl text-[11px] font-sans font-bold uppercase tracking-widest hover:bg-[#F0F5F9] transition-colors relative z-10">Agendar Calendario</button>
                    </div>
                  </div>
                </div>
              </section>

              {/* ITINERARIO */}
              <section id="itinerario" className="relative py-32 bg-[#FFFDF2] overflow-hidden">
                <AtmosphericLandscape src="https://images.unsplash.com/photo-1470240731273-7821a6eeb6bd?auto=format&fit=crop&q=80&w=2000" opacity="opacity-[0.10]" bgColor="from-[#FFFDF2] to-[#FFFDF2]" />
                <div className="absolute inset-0 bg-gradient-to-b from-[#FFFDF2] to-transparent h-48 z-0 pointer-events-none"></div>
                <GoldenDust /> 
                <WatercolorWash color="bg-orange-100" style={{ top: '2%', right: '15%', width: '300px', height: '300px' }} />
                <BotanicalLineArt style={{ top: '2%', left: '5%', width: '200px', height: '200px' }} rotation={-15} />
                <div className="relative z-10 max-w-4xl mx-auto px-6 text-center mb-20">
                  <span className="text-[#5C768D] font-sans text-[11px] uppercase tracking-[0.4em] font-bold">Cronograma</span>
                  <h2 className="text-4xl md:text-5xl mt-4 font-light italic text-[#2C3E50]">El Viaje del Día</h2>
                </div>
                <div className="relative z-10 max-w-4xl mx-auto px-6">
                  <div className="absolute left-4 md:left-1/2 top-0 bottom-0 w-[1px] bg-[#5C768D]/30 -translate-x-1/2"></div>
                  <div className="space-y-24">
                    {itinerary.map((item, index) => (
                      <div key={index} className={`relative flex items-center ${index % 2 === 0 ? 'md:flex-row-reverse' : ''}`}>
                        <div className="absolute left-4 md:left-1/2 w-12 h-12 bg-[#FFFDF2] border-2 border-[#5C768D] rounded-full -translate-x-1/2 z-10 flex items-center justify-center text-[#5C768D] shadow-md">{item.icon}</div>
                        <div className="ml-16 md:ml-0 md:w-1/2 md:px-16">
                          <div className="p-10 rounded-[2.5rem] bg-white/80 backdrop-blur-sm border border-white/60 shadow-sm hover:shadow-lg transition-all duration-300">
                            <span className="text-[#5C768D] font-sans text-[10px] font-bold tracking-widest">{item.time}</span>
                            <h4 className="text-2xl mt-4 mb-2 font-light text-[#2C3E50]">{item.title}</h4>
                            <p className="text-[#7F8C8D] font-sans text-sm mb-4">{item.desc}</p>
                            <div className="pt-4 border-t border-gray-50 italic text-[#5C768D] text-xs opacity-80 tracking-tighter">"{item.phrase}"</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              {/* VESTIMENTA */}
              <section id="vestimenta" className="relative py-32 px-6 w-full bg-[#FCEFEF]">
                <div className="absolute inset-0 bg-gradient-to-t from-[#FCEFEF] to-transparent h-32 z-0 pointer-events-none top-0"></div>
                <BotanicalLineArt style={{ top: '5%', left: '40%', width: '250px', height: '250px' }} rotation={90} />
                <div className="relative z-10 max-w-6xl mx-auto grid md:grid-cols-2 gap-20 items-center">
                  <div className="relative group">
                    <div className="absolute -inset-6 bg-white/50 rounded-[4rem] -rotate-3 transition-transform group-hover:rotate-0"></div>
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&q=80&w=2069" alt="Estética" className="relative rounded-[3.5rem] shadow-2xl grayscale-[15%] contrast-[95%]" />
                  </div>
                  <div className="space-y-12">
                    <div>
                      <h2 className="text-4xl md:text-5xl mt-6 mb-8 font-light italic text-[#2C3E50]">Etiqueta</h2>
                      <div className="space-y-10">
                        <div className="flex gap-8"><Shirt className="text-[#5C768D] w-7 h-7 shrink-0" /><p className="text-lg text-[#7F8C8D]"><strong className="text-[#2C3E50]">Hombres:</strong> Casual elegante, camisa, blazer y pantalón de tela (sin corbata).<br /><br /><strong className="text-[#2C3E50]">Mujeres:</strong> Vestido largo, Midi o faldas elegantes.</p></div>
                        <div className="flex gap-8"><Info className="text-[#5C768D] w-7 h-7 shrink-0" /><p className="text-lg text-[#7F8C8D]">Estaremos en la naturaleza: usar calzado cómodo para el césped y traer abrigo para la noche.</p></div>
                      </div>
                    </div>
                    {/* COLORES RESERVADOS */}
                    <div className="mt-8 pt-8 border-t border-[#5C768D]/20">
                       <div className="p-6 md:p-8 rounded-[2rem] bg-white/60 backdrop-blur-sm border border-[#5C768D]/20 shadow-sm relative overflow-hidden group hover:bg-white/80 transition-colors duration-500">
                           <div className="absolute top-0 left-0 w-1.5 h-full bg-[#5C768D]/50"></div>
                           <p className="font-sans text-[10px] md:text-xs uppercase tracking-[0.2em] text-[#5C768D] mb-4 font-bold flex items-center gap-2">
                             <AlertCircle className="w-4 h-4" /> Nota Especial de Etiqueta
                           </p>
                           <p className="text-lg md:text-xl text-[#2C3E50] font-light italic leading-relaxed">
                         Por favor no usar: <span className="font-semibold not-italic">Blanco, marfil, nude muy claro o rosado muy claro</span>. Así mismo, tenis antes de la fiesta.
                       </p>
                    </div>
                  </div>
                </div>
            </div> {/* <--- ESTE ES EL MURO DE CONTENCIÓN QUE FALTABA */}
              </section>

              {/* DETALLE CON AMOR */}
              <section className="relative py-32 px-6 text-center w-full bg-[#F0F5F9]">
                <WatercolorWash color="bg-rose-200" style={{ top: '-20%', right: '20%', width: '600px', height: '600px' }} />
                <GoldFlourish style={{ bottom: '5%', left: '10%', width: '180px', height: '180px' }} />
                <div className="relative z-10 max-w-4xl mx-auto">
                  <Gift className="text-[#5C768D] w-12 h-12 mx-auto mb-8 opacity-80" />
                  <h2 className="text-4xl font-light italic mb-10 text-[#2C3E50]">Un detalle con amor</h2>
                  <div className="bg-white/70 backdrop-blur-sm p-8 md:p-16 rounded-[4rem] border border-white/60 group shadow-sm">
                    <p className="text-[#2C3E50] font-serif text-xl md:text-2xl font-light italic mb-12 max-w-2xl mx-auto leading-relaxed">
                      Nuestra alegría es su compañía. Si desean hacernos un presente, tendremos <span className="font-semibold not-italic uppercase tracking-[0.2em] text-[0.8em] ml-1">Lluvia de sobres</span>.
                    </p>
                    <div className="relative h-[450px] rounded-[2.5rem] overflow-hidden shadow-2xl">
                       <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10"></div>
                       <img 
                         src="Gemini_Generated_Image_2a2e2w2a2e2w2a2enueva.png" 
                         alt="Detalle de regalo" 
                         className="w-full h-full object-cover transform transition-transform duration-[4000ms] group-hover:scale-110" 
                       />
                       <div className="absolute inset-0 z-20 flex flex-col items-center justify-end p-12">
                          <p className="text-white text-2xl md:text-3xl font-light italic text-center leading-relaxed mb-6">
                            "Su compañía será parte del inicio de nuestro hogar y nuestros sueños compartidos."
                          </p>
                          <Sparkles className="text-[#EAB308] w-6 h-6 opacity-80" />
                       </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* PRE-WEDDING */}
              <section id="pre-wedding" className="relative py-32 px-6 w-full text-center overflow-hidden bg-[#FFFDF2]">
                <AtmosphericLandscape src="https://images.unsplash.com/photo-1541535881962-3bb380b08458?auto=format&fit=crop&q=80&w=2000" opacity="opacity-[0.10]" blend="mix-blend-multiply" bgColor="from-[#FFFDF2] to-[#FFFDF2]" />
                <WatercolorWash color="bg-orange-100" style={{ bottom: '-10%', left: '15%', width: '400px', height: '400px' }} />
                
                <div className="relative z-10 max-w-4xl mx-auto">
                  <span className="text-[#5C768D] font-sans text-[11px] uppercase tracking-[0.4em] font-bold">Viernes en la Tarde</span>
                  <h2 className="text-4xl md:text-5xl mt-4 font-light italic text-[#2C3E50] mb-8">El Preámbulo</h2>
                  
                  <div className="bg-white/60 backdrop-blur-md p-10 md:p-16 rounded-[4rem] border border-[#5C768D]/20 shadow-sm relative">
                    <Glass className="w-10 h-10 text-[#5C768D] mx-auto mb-8 opacity-80" />
                    <p className="text-[#2C3E50] font-serif text-xl md:text-2xl font-light italic mb-8 max-w-2xl mx-auto leading-relaxed">
                      "Para quienes deseen adelantarse a la celebración, los esperamos la tarde anterior para empezar a construir los recuerdos de este fin de semana inolvidable."
                    </p>
                    <div className="w-16 h-[1px] bg-[#5C768D]/30 mx-auto mb-8"></div>
                    <p className="text-[#7F8C8D] font-sans text-base leading-relaxed max-w-xl mx-auto mb-10">
                      Nos encantaría que nos acompañaran a compartir un par de bebidas y entradas en un ambiente relajado para ir encendiendo la chispa del gran día.
                    </p>
                    <div className="flex flex-col items-center justify-center space-y-4">
                      <p className="font-sans text-[11px] uppercase tracking-widest font-bold text-[#5C768D]">Restaurante La Guaca, Villa de Leyva</p>
                      <button onClick={openPreWeddingMap} className="flex items-center justify-center space-x-3 border border-[#5C768D]/30 py-3 px-8 rounded-full text-[10px] uppercase tracking-widest font-sans hover:bg-[#5C768D] hover:text-white transition-all">
                        <MapPin className="w-4 h-4" /><span>Ver Ubicación</span>
                      </button>
                    </div>
                  </div>
                </div>
              </section>

              {/* RSVP & FORMULARIO */}
              <section id="rsvp" className="relative py-32 px-6 w-full bg-[#FFFDF2]">
                <BotanicalLineArt style={{ bottom: '0%', right: '-5%', width: '350px', height: '350px' }} rotation={-90} />
                
                {/* IFRAME OCULTO (El antídoto infalible contra bloqueos de CORS y Pantallas Blancas) */}
                <iframe name="hidden_iframe" id="hidden_iframe" style={{ display: 'none' }}></iframe>

                <div className="relative z-10 max-w-4xl mx-auto">
                  <div className="text-center mb-20">
                    <span className="text-[#5C768D] font-sans text-[11px] uppercase tracking-[0.4em] font-bold">Confirmación</span>
                    <h2 className="text-4xl md:text-6xl mt-4 font-light italic text-[#2C3E50]">¿Nos acompañan?</h2>
                    <div className="mt-8 space-y-3 px-4">
                      <p className="text-[#7F8C8D] font-sans text-[11px] uppercase tracking-widest font-bold">
                        Por favor, diligéncialo con tu pareja una sola vez antes del 20 de julio.
                      </p>
                      <p className="text-[#5C768D] italic font-serif text-lg md:text-xl max-w-2xl mx-auto">
                        "Nos encantan los niños, pero esta celebración será solo para los adultos invitados."
                      </p>
                    </div>
                  </div>

                  {submitted ? (
                    <div className="bg-white/80 p-16 rounded-[3rem] text-center border border-[#5C768D]/20 animate-fade-in shadow-inner backdrop-blur-sm">
                      <CheckCircle className="text-[#5C768D] w-16 h-16 mx-auto mb-8" />
                      <h3 className="text-3xl mb-4 font-light italic font-serif text-[#2C3E50]">¡Gracias, {formData.nombre}!</h3>
                      
                      <p className="text-[#7F8C8D] font-sans text-sm md:text-base max-w-md mx-auto leading-relaxed">
                        {getFeedbackMessage()}
                      </p>
                      
                      <button onClick={() => setSubmitted(false)} className="mt-12 text-[11px] uppercase tracking-widest font-sans font-bold text-[#5C768D] hover:underline">Enviar otra respuesta</button>
                    </div>
                  ) : (
                    // FORMULARIO NATIVO: Apuntando al iframe para evitar cualquier rechazo de código en iOS
                    <form action={GOOGLE_FORM_URL} method="POST" target="hidden_iframe" onSubmit={handleSubmit} className="bg-white/70 backdrop-blur-md p-12 md:p-16 rounded-[3.5rem] border border-white/60 shadow-sm space-y-10">
                      
                      <div className="grid md:grid-cols-2 gap-10">
                        <div className="space-y-4 text-left">
                          <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D]">Tu Nombre Completo</label>
                          <input required type="text" name={ENTRY_IDS.nombre} value={formData.nombre} onChange={handleInputChange('nombre')} placeholder="Ej. Juan Pérez" className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-2xl px-6 py-5 outline-none font-sans text-[#2C3E50] transition-colors" />
                        </div>
                        <div className="space-y-4 text-left">
                          <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D]">Nombre de tu pareja <span className="lowercase font-normal opacity-70 tracking-normal">(opcional)</span></label>
                          <input type="text" name={ENTRY_IDS.nombrePareja} value={formData.nombrePareja} onChange={handleInputChange('nombrePareja')} placeholder="Ej. María Gómez" className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-2xl px-6 py-5 outline-none font-sans text-[#2C3E50] transition-colors" />
                        </div>
                      </div>

                      <div className="space-y-4 text-left">
                        <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D]">¿Asistirás a la boda el sábado?</label>
                        <select name={ENTRY_IDS.asistencia} value={formData.asistencia} onChange={handleInputChange('asistencia')} className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-2xl px-6 py-5 outline-none font-sans text-[#2C3E50] cursor-pointer transition-colors">
                          <option value="Confirmar asistencia">Confirmar Asistencia</option>
                          <option value="Lamentablemente no podré ir">Lamentablemente no podré</option>
                        </select>
                      </div>

                      <div className="space-y-4 text-left">
                        <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D] flex items-center gap-2"><Glass className="w-4 h-4" /> ¿Nos acompañarás al Pre-Wedding el viernes?</label>
                        <select name={ENTRY_IDS.preWedding} value={formData.asistenciaPreWedding} onChange={handleInputChange('asistenciaPreWedding')} className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-2xl px-6 py-5 outline-none font-sans text-[#2C3E50] cursor-pointer transition-colors">
                          <option value="Confirmar Asistencia">Sí, allí estaremos para brindar</option>
                          <option value="Lamentablemente no podré ir">No podremos, nos vemos directo el sábado</option>
                        </select>
                      </div>

                      <div className="space-y-4 text-left">
                        <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D] flex items-center gap-2"><AlertCircle className="w-4 h-4" /> Notas o Alergias para cada persona</label>
                        <textarea name={ENTRY_IDS.alergias} value={formData.alergias} onChange={handleInputChange('alergias')} rows="3" placeholder="Mensaje para los novios..." className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-3xl px-6 py-5 outline-none font-sans resize-none text-[#2C3E50] transition-colors"></textarea>
                      </div>

                      <button type="submit" disabled={loading} className="w-full bg-[#5C768D] text-white py-6 rounded-2xl text-xs uppercase tracking-[0.4em] font-sans font-bold hover:bg-[#4A6074] transition-all flex items-center justify-center gap-4 active:scale-95 disabled:opacity-50 shadow-xl shadow-blue-900/5">
                        <Send className="w-4 h-4" />
                        <span>{loading ? 'ENVIANDO...' : 'ENVIAR RESPUESTA'}</span>
                      </button>
                    </form>
                  )}
                </div>
              </section>

              <footer className="relative py-32 bg-white text-center border-t border-[#EAD3C6] overflow-hidden">
                <BotanicalLineArt style={{ bottom: '-10%', left: '40%', width: '200px', height: '200px' }} rotation={15} />
                <GoldenDust />
                <div className="relative z-10">
                  <h2 className="text-4xl font-light italic text-[#5C768D] mb-10 tracking-widest">Laura & Gabriel</h2>
                  <div className="w-16 h-[1px] bg-[#5C768D]/30 mx-auto mb-12"></div>
                  <p className="text-[11px] uppercase tracking-[0.5em] text-[#7F8C8D] mb-12 font-bold font-sans">VILLA DE LEYVA — 08.08.2026</p>
                  <Heart className="w-5 h-5 text-[#5C768D] mx-auto opacity-40" />
                </div>
              </footer>

              <div className="fixed bottom-6 right-6 z-50 animate-fade-in-up">
                <audio ref={audioRef} loop src="https://cdn.pixabay.com/audio/2022/11/22/audio_d3e18a9dbd.mp3" />
                <button 
                  onClick={() => setIsPlaying(!isPlaying)}
                  className="bg-white/90 backdrop-blur-md border border-[#F0F5F9] p-4 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 hover:bg-[#FFFDF2] transition-all group"
                  title={isPlaying ? "Pausar música" : "Escuchar nuestra canción"}
                >
                  {isPlaying ? (
                    <Pause className="w-6 h-6 text-[#5C768D] animate-pulse" />
                  ) : (
                    <div className="relative">
                      <Music className="w-6 h-6 text-[#5C768D] group-hover:animate-bounce" />
                      <span className="absolute -top-1 -right-1 flex h-3 w-3">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#5C768D] opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-[#5C768D]"></span>
                      </span>
                    </div>
                  )}
                </button>
              </div>

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
